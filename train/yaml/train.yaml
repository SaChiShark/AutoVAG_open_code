### model
model_name_or_path: meta-llama/Llama-3.2-3B-Instruct

overwrite_output_dir: False
### fintuned
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 32
lora_alpha: 16
lora_dropout: 0.05

### data
dataset_dir: .
dataset: train_open_code
template: llama3
cutoff_len: 1200
max_samples: 1000000
preprocessing_num_workers: 16
packing: false
### output
output_dir: save/train_open_code
logging_steps: 5
save_steps: 100
plot_loss: true
report_to: wandb

### patameters
per_device_train_batch_size: 32
gradient_accumulation_steps: 2
learning_rate: 0.00005
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_steps: 0
max_grad_norm: 1.0
optim: adamw_torch
bf16: true
ddp_timeout: 180000000
include_num_input_tokens_seen: true

### other
flash_attn: auto
enable_liger_kernel: true
